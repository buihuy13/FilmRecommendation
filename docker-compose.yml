  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   restart: on-failure
  dagster:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: dagster
    env_file: ./.env
    environment:
      # Dagster env
      - DAGSTER_ENV=${DAGSTER_ENV}
      - DAGSTER_HOME=${DAGSTER_HOME}
      # Postgres env (for logs)
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${CONTAINER_POSTGRES_PORT}
      - DATABASE_URL=${DATABASE_URL}
      # MinIO (For datalake)
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT}
    volumes:
      - ./workspace.yaml:/opt/dagster/dagster_home/dagster-project/workspace.yaml:ro
      - ./pipeline:/opt/dagster/dagster_home/dagster-project/pipeline
      - ./data/dataset:/opt/dagster/dagster_home/dagster-project/data/dataset:ro
      - ./jars:/opt/spark/extra-jars:ro
      # Automatically generated (ignore)
      - ./data/dagster/compute_logs:/opt/dagster/dagster_home/dagster-project/compute_logs
      - ./data/dagster/storage:/opt/dagster/dagster_home/dagster-project/storage
      - ./data/dagster/local_artifact_storage:/opt/dagster/dagster_home/dagster-project/local_artifact_storage
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  minio:
    image: minio/minio:latest
    container_name: minio
    env_file: ./.env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001" --address ":9000"
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: on-failure

  #Ensure buckets(landing, bronze, silver, gold) are created and versioning is on
  mc:
    image: minio/mc:latest
    container_name: mc
    env_file: ./.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do echo 'waiting for minio...'; sleep 2; done
        mc mb -p local/landing || true
        mc mb -p local/bronze || true
        mc mb -p local/silver || true
        mc mb -p local/gold || true
        mc version enable local/landing || true
        mc version enable local/bronze || true
        mc version enable local/silver || true
        mc version enable local/gold || true
    restart: "no"

  # Spark
  spark-master:
    build:
      dockerfile: ./Dockerfile.spark
    image: spark-master:latest 
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    env_file:
      - .env
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./jars:/opt/spark/extra-jars:ro
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-1:
    image: spark-master:latest 
    container_name: spark-worker-1
    hostname: spark-worker-1
    env_file:
      - .env
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/opt/spark/models
      - TRANSFORMERS_CACHE=/opt/spark/models
    depends_on:
      spark-master:
        condition: service_healthy
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081" 
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./jars:/opt/spark/extra-jars:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-2:
    image: spark-master:latest 
    container_name: spark-worker-2
    hostname: spark-worker-2
    env_file:
      - .env
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/opt/spark/models
      - TRANSFORMERS_CACHE=/opt/spark/models
    depends_on:
      spark-master:
        condition: service_healthy
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8083:8081"
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./jars:/opt/spark/extra-jars:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5

