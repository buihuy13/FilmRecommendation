#S3 / MinIO
spark.hadoop.fs.s3a.endpoint        abc
spark.hadoop.fs.s3a.access.key      abc
spark.hadoop.fs.s3a.secret.key      abc
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.impl            abc
spark.hadoop.fs.s3a.aws.credentials.provider    abc
spark.hadoop.fs.s3a.connection.ssl.enabled    false
spark.hadoop.fs.s3a.multipart.size                  128M
spark.hadoop.fs.s3a.fast.upload                     true
spark.hadoop.fs.s3a.fast.upload.buffer              bytebuffer
spark.hadoop.fs.s3a.connection.maximum              100

#Delta Lake
spark.sql.extensions                abc
spark.sql.catalog.spark_catalog     abc

#Hive Metastore
# spark.sql.catalogImplementation     abc
# spark.hadoop.hive.metastore.uris    abc

#Performance
spark.executor.memory                       4g
spark.driver.memory                         4g
spark.executor.cores                        2

# AQE
spark.sql.adaptive.enabled                          true
spark.sql.adaptive.coalescePartitions.enabled       true
spark.sql.adaptive.skewJoin.enabled                 true
spark.sql.shuffle.partitions                        16

#Output Committer
mapreduce.fileoutputcommitter.algorithm.version     2
spark.hadoop.mapreduce.fileoutputcommitter.cleanup-failures.ignored  true